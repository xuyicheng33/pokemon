name: Setup Godot Env
description: Setup Godot runtime and cache imported assets for CI jobs

runs:
  using: composite
  steps:
    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v1
      with:
        version: "4.6.1"
        use-dotnet: "false"
        include-templates: "false"
    - name: Cache Godot Import
      uses: actions/cache@v4
      with:
        path: .godot/imported
        key: godot-import-${{ runner.os }}-${{ hashFiles('content/**/*.tres', 'project.godot') }}
        restore-keys: |
          godot-import-${{ runner.os }}-
