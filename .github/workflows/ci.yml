name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

jobs:
  gdunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run gdUnit Gate
        run: bash tests/check_gdunit_gate.sh

  repo_and_arch_gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run Suite Reachability
        run: bash tests/check_suite_reachability.sh
      - name: Run Architecture Gates
        run: bash tests/check_architecture_constraints.sh
      - name: Run Repo Consistency
        run: bash tests/check_repo_consistency.sh

  python_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python scripts and gates
        run: ruff check scripts/ tests/gates/ --select E,F,W --ignore E501

  boot_and_sandbox_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run Boot Smoke
        run: bash tests/check_boot_smoke.sh
      - name: Run Sandbox Smoke Matrix
        run: bash tests/check_sandbox_smoke_matrix.sh

  extended_gate:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run Extended Gate
        run: bash tests/run_extended_gate.sh
