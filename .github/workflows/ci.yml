name: CI

on:
  push:
  pull_request:

jobs:
  gdunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run gdUnit Gate
        run: bash tests/check_gdunit_gate.sh

  repo_and_arch_gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run Suite Reachability
        run: bash tests/check_suite_reachability.sh
      - name: Run Architecture Gates
        run: bash tests/check_architecture_constraints.sh
      - name: Run Repo Consistency
        run: bash tests/check_repo_consistency.sh

  boot_and_sandbox_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Godot Env
        uses: ./.github/actions/setup-godot
      - name: Run Boot Smoke
        run: bash tests/check_boot_smoke.sh
      - name: Run Sandbox Smoke Matrix
        run: bash tests/check_sandbox_smoke_matrix.sh
